<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Twins Delivery</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <div class="admin-sidebar-logo">
                    <i class="fas fa-utensils"></i>
                    <span>Twins Delivery</span>
                </div>
            </div>
            <nav class="admin-nav">
                <a href="dashboard.html" class="admin-nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="restaurants.html" class="admin-nav-item">
                    <i class="fas fa-store"></i>
                    <span>Restaurants</span>
                </a>
                <a href="menu-editor.html" class="admin-nav-item">
                    <i class="fas fa-utensils"></i>
                    <span>Menu Editor</span>
                </a>
                <a href="#" id="logout-btn" class="admin-nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-header">
                <h1><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
                <div class="admin-header-actions">
                    <a href="restaurants.html" class="admin-btn success">
                        <i class="fas fa-plus"></i> Add Restaurant
                    </a>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="admin-stats">
                <div class="admin-card">
                    <div class="stat-card">
                        <div class="stat-icon" style="background-color: rgba(0, 123, 255, 0.1); color: #007bff;">
                            <i class="fas fa-store"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="restaurant-count">0</h3>
                            <p>Restaurants</p>
                        </div>
                    </div>
                </div>
                <div class="admin-card">
                    <div class="stat-card">
                        <div class="stat-icon" style="background-color: rgba(40, 167, 69, 0.1); color: #28a745;">
                            <i class="fas fa-hamburger"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="menu-items-count">0</h3>
                            <p>Menu Items</p>
                        </div>
                    </div>
                </div>
                <div class="admin-card">
                    <div class="stat-card">
                        <div class="stat-icon" style="background-color: rgba(255, 193, 7, 0.1); color: #ffc107;">
                            <i class="fas fa-utensils"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="cuisines-count">0</h3>
                            <p>Cuisines</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Activities -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2><i class="fas fa-list"></i> Recent Activities</h2>
                </div>
                <div class="admin-activity-log" id="activity-log">
                    <div class="admin-activity-item">
                        <i class="fas fa-sign-in-alt"></i>
                        <div class="admin-activity-content">
                            <p>Admin logged in</p>
                            <span class="admin-activity-time" id="login-time">Just now</span>
                        </div>
                    </div>
                    <!-- More activity items will be added dynamically -->
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2><i class="fas fa-bolt"></i> Quick Actions</h2>
                </div>
                <div class="admin-quick-actions">
                    <a href="restaurants.html" class="admin-quick-action">
                        <i class="fas fa-plus"></i>
                        <span>Add Restaurant</span>
                    </a>
                    <a href="menu-editor.html" class="admin-quick-action">
                        <i class="fas fa-edit"></i>
                        <span>Edit Menus</span>
                    </a>
                    <a href="../index.html" target="_blank" class="admin-quick-action">
                        <i class="fas fa-eye"></i>
                        <span>View Website</span>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <style>
        /* Additional styles specific to dashboard */
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .stat-info h3 {
            font-size: 2rem;
            margin: 0 0 5px 0;
            color: var(--admin-dark);
        }

        .stat-info p {
            margin: 0;
            color: #666;
            font-weight: 500;
        }

        .admin-activity-log {
            padding: 10px 0;
        }

        .admin-activity-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .admin-activity-item:last-child {
            border-bottom: none;
        }

        .admin-activity-item i {
            color: var(--admin-primary);
            font-size: 1.2rem;
            background-color: rgba(0, 55, 255, 0.1);
            padding: 8px;
            border-radius: 50%;
        }

        .admin-activity-content p {
            margin: 0 0 5px 0;
            font-weight: 500;
        }

        .admin-activity-time {
            font-size: 0.85rem;
            color: #999;
        }

        .admin-quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 10px 0;
        }

        .admin-quick-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            background-color: var(--admin-light);
            border-radius: 10px;
            text-decoration: none;
            color: var(--admin-dark);
            transition: var(--admin-transition);
        }

        .admin-quick-action:hover {
            transform: translateY(-5px);
            box-shadow: var(--admin-shadow);
            background-color: var(--admin-primary);
            color: white;
        }

        .admin-quick-action i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .admin-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is logged in
            if (!localStorage.getItem('adminLoggedIn')) {
                window.location.href = 'index.html';
                return;
            }
            
            // Set current time for login activity
            document.getElementById('login-time').textContent = new Date().toLocaleTimeString();

            // Handle logout
            document.getElementById('logout-btn').addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('adminLoggedIn');
                window.location.href = 'index.html';
            });

            // Load restaurant data
            loadRestaurants();
        });

        // Load restaurant data and update stats
        function loadRestaurants() {
            // Get restaurants from localStorage or use default data
            let restaurants = JSON.parse(localStorage.getItem('restaurants'));

            // If no restaurants in localStorage, use the data from the HTML file (initially 20 restaurants)
            if (!restaurants) {
                // Initialize from the main restaurants data
                initializeRestaurantsData();
                restaurants = JSON.parse(localStorage.getItem('restaurants'));
            }

            // Update stats
            document.getElementById('restaurant-count').textContent = restaurants.length;
            
            // Count menu items across all restaurants
            let menuItemsCount = 0;
            let cuisines = new Set();

            restaurants.forEach(restaurant => {
                // Add cuisine to set
                cuisines.add(restaurant.cuisine);
                
                // Try to load menu data
                const menuFileName = restaurant.name.replace(/\s+/g, " ");
                
                // Check if menu data exists in localStorage
                const menuData = localStorage.getItem(`menu_${menuFileName}`);
                if (menuData) {
                    try {
                        const parsedMenuData = JSON.parse(menuData);
                        // Count items across all categories
                        if (parsedMenuData.categories) {
                            parsedMenuData.categories.forEach(category => {
                                if (category.items) {
                                    menuItemsCount += category.items.length;
                                }
                            });
                        }
                    } catch (e) {
                        console.error('Error parsing menu data:', e);
                    }
                }
            });

            document.getElementById('menu-items-count').textContent = menuItemsCount;
            document.getElementById('cuisines-count').textContent = cuisines.size;

            // Add activity for data loaded
            addActivity('Data loaded from storage');
        }

        // Add activity to the log
        function addActivity(message) {
            const activityLog = document.getElementById('activity-log');
            const activityItem = document.createElement('div');
            activityItem.className = 'admin-activity-item';
            
            activityItem.innerHTML = `
                <i class="fas fa-history"></i>
                <div class="admin-activity-content">
                    <p>${message}</p>
                    <span class="admin-activity-time">${new Date().toLocaleTimeString()}</span>
                </div>
            `;
            
            activityLog.appendChild(activityItem);
        }

            const initialRestaurants = [

                    }
                },
                {
                    name: "KFC",

                    rating: 4.4,
                    reviews: 1700,
                    deliveryTime: "20-30 min",
                    price: "$$",
                    image: "../pictures/kfc.jpeg",
                    badge: {
                        text: "Fast",
                        icon: "bolt",
                        color: "#ff7a2d"
                    }
                },
                {
                    name: "Pizza Hut",
                    cuisine: "Pizza",
                    rating: 4.3,

                    price: "$$",
                    image: "../pictures/pizza hut.jpeg",
                    badge: {

                },
                {

                    badge: {
                        text: "Premium",

                    }
                },
                {
                    name: "Terrasse à Petit Déjeuner",
                    cuisine: "Breakfast",

                    price: "$$",

                },
                {

            // Save to localStorage
            localStorage.setItem('restaurants', JSON.stringify(initialRestaurants));
            
            // Add activity
            addActivity('Initialized restaurant data');
        }
    </script>
</body>
</html>
